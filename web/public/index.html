<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Video Factory — ギャラリー</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="topbar">
    <span class="kicker">VIDEO FACTORY</span>
    <a class="shuffle-link" href="random.html">🔀 ランダム再生</a>
  </div>
  <h1 class="page-title">生成済みチュートリアル動画</h1>

  <div class="container">
    <div id="grid" class="grid"></div>
    <div id="empty" class="empty-state" style="display:none">
      まだ生成された動画がありません。
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    async function renderGallery() {
      const grid = document.getElementById("grid");
      const empty = document.getElementById("empty");
      let manifest;
      try {
        manifest = await fetchJSON("manifest.json");
      } catch (e) {
        empty.textContent = "manifest.json を読み込めませんでした: " + e.message;
        empty.style.display = "block";
        return;
      }

      if (!manifest.length) {
        empty.style.display = "block";
        return;
      }

      grid.innerHTML = manifest.map((v) => `
        <a class="card" href="video.html?id=${encodeURIComponent(v.id)}">
          <img src="${v.thumbnail_path}" alt="" loading="lazy" />
          <div class="card-body">
            <p class="card-title">${v.title}</p>
            <div class="tags">${v.tags.map((t) => `<span class="tag">${t}</span>`).join("")}</div>
            <div class="card-meta">
              <span>${formatDuration(v.duration_sec)}</span>
              <span>${formatDate(v.created_at)}</span>
            </div>
          </div>
        </a>
      `).join("");
    }

    renderGallery();
  </script>
</body>
</html>
